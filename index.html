<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ИЧ Трекер">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>ИЧ · Трекер тренировок</title>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
  window.onerror = function (msg, src, line) {
    try {
      var v = document.getElementById("view");
      if (v) v.innerHTML = '<p class="hint" style="color:#ff453a">Ошибка: ' +
        String(msg) + ' (стр. ' + line + ')</p>';
    } catch (e) {}
    return false;
  };
</script>
<style>
  :root {
    --bg:        #0a0a0a;
    --surface:   #1c1c1e;
    --surface-2: #2a2a2c;
    --line:      #313134;
    --text:      #ffffff;
    --text-2:    #a1a1a6;
    --muted:     #6e6e73;
    --lime:      #d4f000;
    --lime-dim:  #b7d400;
    --amber:     #f5a623;
    --good:      #3ddc84;
    --crit:      #ff453a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); }
  body {
    color: var(--text);
    font-family: system-ui, -apple-system, "SF Pro Display", "Segoe UI", sans-serif;
    font-size: 16px; line-height: 1.45;
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }
  .app { max-width: 720px; margin: 0 auto; padding: 0 16px 40px; }

  /* ---- Шапка-герой ---- */
  .hero { position: relative; padding: 22px 0 14px; margin-bottom: 12px; overflow: hidden; }
  .hero::before {
    content: ""; position: absolute; inset: -50% -30% auto -30%; height: 240px;
    background:
      radial-gradient(55% 100% at 18% 0%, rgba(212,240,0,.13), transparent 70%),
      radial-gradient(50% 100% at 92% 0%, rgba(245,166,35,.11), transparent 70%);
    pointer-events: none;
  }
  .eyebrow {
    position: relative; font-size: 12px; font-weight: 800; letter-spacing: .14em;
    text-transform: uppercase; color: var(--lime); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .eyebrow .back {
    font: inherit; letter-spacing: .06em; background: none; border: none;
    color: var(--text-2); cursor: pointer; padding: 0; text-transform: uppercase;
  }
  .eyebrow .back:active { color: var(--lime); }
  h1.title {
    position: relative; font-size: clamp(28px, 8.5vw, 44px); line-height: .94;
    font-weight: 900; letter-spacing: -.02em; text-transform: uppercase;
    text-wrap: balance; margin: 0;
  }
  h1.title.compact { font-size: clamp(22px, 6.5vw, 34px); }
  h1.title .hl { color: var(--lime); }
  .subtitle { position: relative; color: var(--text-2); font-size: 14px; margin-top: 8px; }

  /* ---- Кнопки ---- */
  .toolbar { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
  .btn {
    font: inherit; font-weight: 700; font-size: 14px; padding: 12px 18px;
    border-radius: 12px; border: 1px solid transparent; cursor: pointer;
    background: var(--surface-2); color: var(--text); line-height: 1;
  }
  .btn:active { filter: brightness(1.15); }
  .btn-primary { background: var(--lime); color: #0a0a0a; }
  .btn-ghost { background: transparent; border-color: var(--line); color: var(--text-2); }
  .btn-block { width: 100%; text-align: center; padding: 15px; }
  .btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

  /* ---- Карточки-плитки ---- */
  .list { display: flex; flex-direction: column; gap: 12px; }
  .tile {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 18px;
  }
  .tile:active { border-color: var(--lime); }
  .tile > span:first-child { flex: 1 1 auto; min-width: 0; overflow: hidden; }
  .tile-title { overflow: hidden; text-overflow: ellipsis; }
  .tile-title { display: block; font-weight: 800; font-size: 17px; letter-spacing: -.01em; text-transform: uppercase; }
  .tile-sub { display: block; color: var(--muted); font-size: 13px; margin-top: 3px; }
  .tile-chevron { color: var(--muted); font-size: 22px; flex: 0 0 auto; }
  .tile-prog { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex: 0 0 auto; }
  .prog-num { font-size: 13px; font-weight: 700; color: var(--text-2); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .prog-track { width: 72px; height: 7px; border-radius: 99px; background: var(--surface-2); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--lime), var(--amber)); }

  .empty { text-align: center; color: var(--muted); padding: 40px 10px; }
  .hint { color: var(--muted); font-size: 13px; margin: 14px 2px 0; }

  /* ---- Абонемент-панель ---- */
  .abon {
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 14px 16px; margin-bottom: 16px;
  }
  .abon-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .abon-left { font-size: 13px; color: var(--text-2); }
  .abon-big { font-size: 22px; font-weight: 800; color: var(--lime); font-variant-numeric: tabular-nums; }
  .abon-big.warn { color: var(--amber); }
  .abon-big.crit { color: var(--crit); }
  .abon-edit { font: inherit; font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; }

  /* ---- Упражнение ---- */
  .exercise {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 18px; padding: 14px 16px; margin-bottom: 14px;
  }
  .exercise.done { border-color: var(--lime); }
  .ex-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .ex-check {
    flex: 0 0 auto; width: 30px; height: 30px; border-radius: 9px;
    border: 2px solid var(--line); background: var(--surface-2);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: transparent; padding: 0;
  }
  .ex-check.on { background: var(--lime); border-color: var(--lime); color: #0a0a0a; }
  .ex-name {
    flex: 1; font: inherit; font-weight: 800; font-size: 16px; letter-spacing: -.01em;
    border: none; background: none; color: var(--text); padding: 4px 2px;
    border-bottom: 1px dashed transparent; min-width: 0;
  }
  .ex-name:focus { outline: none; border-bottom-color: var(--lime); }
  .ex-btn { flex: 0 0 auto; color: var(--muted); border: none; background: none; cursor: pointer; font-size: 17px; padding: 4px 5px; }
  .ex-btn.chart:active { color: var(--lime); }
  .ex-btn.del:active { color: var(--crit); }

  .sets-wrap { overflow-x: auto; }
  .sets { width: 100%; border-collapse: collapse; }
  .sets th {
    font-size: 10px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); font-weight: 700; padding: 2px 4px 8px; text-align: center;
  }
  .sets th.lbl { text-align: left; }
  .sets td { padding: 5px 3px; text-align: center; vertical-align: middle; }
  .slab { text-align: left; color: var(--text-2); font-size: 13px; font-weight: 600; white-space: nowrap; }
  .slab .warm { color: var(--amber); }
  .scheck {
    width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--line);
    background: var(--surface-2); display: inline-flex; align-items: center;
    justify-content: center; font-size: 14px; color: transparent; cursor: pointer; padding: 0;
  }
  .scheck.on { background: var(--lime); border-color: var(--lime); color: #0a0a0a; }
  .num {
    width: 48px; font: inherit; font-size: 15px; text-align: center;
    border: 1px solid var(--line); border-radius: 9px; background: var(--surface-2);
    color: var(--text); padding: 7px 2px; font-variant-numeric: tabular-nums;
  }
  .num:focus { outline: none; border-color: var(--lime); background: var(--bg); }
  .pcol { border-left: 1px solid var(--line); }
  .phead { color: var(--amber); font-weight: 800; }
  .addrow { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* ---- Панель тоннажа ---- */
  .tonnage {
    display: flex; gap: 10px; flex-wrap: wrap; margin: 4px 0 14px;
  }
  .ton-tile {
    flex: 1 1 120px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 14px;
  }
  .ton-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .ton-val { font-size: 20px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; margin-top: 3px; }
  .ton-val .u { font-size: 12px; color: var(--muted); font-weight: 600; margin-left: 3px; }

  /* ---- Таймер отдыха ---- */
  .rest-bar {
    position: sticky; bottom: 0; z-index: 30;
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
    padding: 12px 16px; margin-top: 18px;
  }
  .rest-time { font-size: 26px; font-weight: 800; color: var(--lime); font-variant-numeric: tabular-nums; min-width: 74px; }
  .rest-time.zero { color: var(--amber); }
  .rest-btns { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }

  /* ---- История / прогресс ---- */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px;
    border-radius: 999px; border: 1px solid var(--line); background: var(--surface);
    color: var(--text-2); cursor: pointer; white-space: nowrap;
  }
  .chip.on { background: var(--lime); border-color: var(--lime); color: #0a0a0a; }
  .hist-item {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 10px;
  }
  .hist-date { font-weight: 800; font-size: 15px; }
  .hist-note { color: var(--text-2); font-size: 13px; margin-top: 6px; white-space: pre-wrap; }
  .hist-sub { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .chart-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
  .chart-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 6px; }
  .chart-delta { font-weight: 700; }

  .note-area {
    width: 100%; font: inherit; font-size: 14px; color: var(--text);
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 14px; resize: vertical; min-height: 54px;
  }
  .note-area:focus { outline: none; border-color: var(--lime); }
  .note-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 2px 6px; }
  .day-name {
    width: 100%; font: inherit; font-weight: 800; font-size: 18px; letter-spacing: -.01em;
    color: var(--text); background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 14px;
  }
  .day-name:focus { outline: none; border-color: var(--lime); }

  .saved-flash {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    background: var(--lime); color: #0a0a0a; padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none;
    transition: opacity .2s; z-index: 60;
  }
  .saved-flash.show { opacity: .95; }

  @media (max-width: 420px) { .num { width: 42px; } body { font-size: 15px; } }
  @media (prefers-reduced-motion: reduce) { .saved-flash { transition: none; } }
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="eyebrow" id="eyebrow"><span>@ilya.fitpro</span></div>
    <h1 class="title" id="title">ТВОИ <span class="hl">КЛИЕНТЫ</span></h1>
    <p class="subtitle" id="subtitle"></p>
  </header>
  <div class="toolbar" id="toolbar"></div>
  <div id="view"></div>
</div>
<div class="saved-flash" id="flash">Сохранено</div>

<script>
(function () {
  "use strict";

  var KEY = "gym_tracker_v1";
  var BACKUP = "gym_tracker_v1_backup";

  function uid() { return "x" + Math.random().toString(36).slice(2, 9); }
  function todayISO() { return new Date().toISOString().slice(0, 10); }
  function nowTime() { var d = new Date(); return d.getHours() + ":" + (d.getMinutes() < 10 ? "0" : "") + d.getMinutes(); }
  function clientHistoryCount(client) {
    if (!client) return 0;
    return client.дни.reduce(function (n, d) { return n + (d.история ? d.история.length : 0); }, 0);
  }

  function ex(название, подходы) {
    return { id: uid(), название: название, сделано: false, подходы: подходы };
  }
  function set(разминка, веса) {
    var данные = {};
    for (var p in веса) данные[p] = { вес: веса[p][0], повт: веса[p][1] };
    return { id: uid(), разминка: разминка, отмечен: false, данные: данные };
  }
  function defSets(люди) {
    function blank() { var b = {}; люди.forEach(function (p) { b[p] = [null, null]; }); return b; }
    return [ set(false, blank()), set(false, blank()), set(false, blank()) ];
  }

  // ---- Стартовые данные (Анвар и Данил) ----
  var SEED = {
    клиенты: [{
      id: "anvar-danil",
      имя: "Анвар и Данил",
      люди: ["Анвар", "Данил"],
      абонемент: { всего: 6, осталось: 5, сумма: 12000 },
      дни: [
        { id: "day1", название: "День 1 — Full Body", заметка: "", история: [], упражнения: [
          ex("Приседания со штангой", [ set(false,{Анвар:[30,12],Данил:[30,12]}), set(false,{Анвар:[30,12],Данил:[30,12]}), set(false,{Анвар:[30,12],Данил:[30,12]}) ]),
          ex("Жим штанги лёжа", [ set(false,{Анвар:[40,6],Данил:[40,10]}), set(false,{Анвар:[40,6],Данил:[40,10]}), set(false,{Анвар:[40,6],Данил:[40,10]}) ]),
          ex("Тяга верхнего блока", [ set(false,{Анвар:[30,12],Данил:[30,12]}), set(false,{Анвар:[30,12],Данил:[30,12]}), set(false,{Анвар:[30,12],Данил:[30,12]}) ]),
          ex("Бицепс «молотки»", [ set(false,{Анвар:[8,8],Данил:[10,10]}), set(false,{Анвар:[8,8],Данил:[10,10]}), set(false,{Анвар:[8,8],Данил:[10,10]}) ]),
          ex("Махи в стороны", [ set(false,{Анвар:[6,15],Данил:[6,15]}), set(false,{Анвар:[6,15],Данил:[6,15]}), set(false,{Анвар:[6,15],Данил:[6,15]}) ]),
        ]},
        { id: "day2", название: "День 2 — Full Body", заметка: "", история: [], упражнения: [
          ex("Разгибание голени в тренажёре сидя", defSets(["Анвар","Данил"])),
          ex("Сгибание голени в тренажёре лёжа", defSets(["Анвар","Данил"])),
          ex("Жим гантелей на наклонной скамье", defSets(["Анвар","Данил"])),
          ex("Горизонтальная тяга в рычажном тренажёре (хаммер)", defSets(["Анвар","Данил"])),
          ex("Трицепс на блоке с прямой рукояткой", defSets(["Анвар","Данил"])),
        ]},
        { id: "day3", название: "День 3 — Full Body", заметка: "", история: [], упражнения: [
          ex("Жим ногами в платформе", defSets(["Анвар","Данил"])),
          ex("Жим в грудном рычажном тренажёре (хаммер)", defSets(["Анвар","Данил"])),
          ex("Тяга верхнего блока узким обратным хватом", defSets(["Анвар","Данил"])),
          ex("Горизонтальная тяга в блоке", defSets(["Анвар","Данил"])),
          ex("Подъём штанги на бицепс", defSets(["Анвар","Данил"])),
        ]},
      ],
    }],
  };

  // ---- Хранилище ----
  var memStore = {};
  function rawSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} memStore[k] = v; }
  function rawGet(k) { try { var v = localStorage.getItem(k); if (v != null) return v; } catch (e) {} return memStore[k] != null ? memStore[k] : null; }

  function migrate(d) {
    // Достраиваем новые поля, если открылись старые данные.
    if (!d || !Array.isArray(d.клиенты)) return JSON.parse(JSON.stringify(SEED));
    d.клиенты.forEach(function (c) {
      if (!Array.isArray(c.люди)) c.люди = ["Клиент"];
      if (!c.абонемент) c.абонемент = { всего: null, осталось: null, сумма: null };
      if (!Array.isArray(c.дни)) c.дни = [];
      c.дни.forEach(function (day) {
        if (typeof day.заметка !== "string") day.заметка = "";
        if (!Array.isArray(day.история)) day.история = [];
        (day.упражнения || []).forEach(function (e) {
          if (!Array.isArray(e.подходы)) e.подходы = [];
        });
      });
    });
    return d;
  }
  function load() {
    var raw = rawGet(KEY) || rawGet(BACKUP);
    if (raw) { try { return migrate(JSON.parse(raw)); } catch (e) {} }
    return JSON.parse(JSON.stringify(SEED));
  }
  var data = load();

  var saveTimer = null;
  function save() {
    var json = JSON.stringify(data);
    rawSet(KEY, json); rawSet(BACKUP, json);
    clearTimeout(saveTimer);
    if (flash) { flash.classList.add("show"); saveTimer = setTimeout(function () { flash.classList.remove("show"); }, 900); }
  }
  window.addEventListener("pagehide", function () { try { save(); } catch (e) {} });
  document.addEventListener("visibilitychange", function () { if (document.visibilityState === "hidden") { try { save(); } catch (e) {} } });

  // ---- DOM ----
  var view = document.getElementById("view");
  var titleEl = document.getElementById("title");
  var subtitleEl = document.getElementById("subtitle");
  var eyebrowEl = document.getElementById("eyebrow");
  var toolbarEl = document.getElementById("toolbar");
  var flash = document.getElementById("flash");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (ch) {
      return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[ch];
    });
  }
  function findClient(cid) { return data.клиенты.find(function (c) { return c.id === cid; }); }
  function findDay(client, did) { return client && client.дни.find(function (d) { return d.id === did; }); }
  function findClientOfDay(day) { return data.клиенты.find(function (c) { return c.дни.some(function (d) { return d.id === day.id; }); }); }
  function dayProgress(day) {
    return { done: day.упражнения.filter(function (e) { return e.сделано; }).length, total: day.упражнения.length };
  }

  function setHeader(eyebrowHtml, titleHtml, subtitle) {
    eyebrowEl.innerHTML = eyebrowHtml;
    titleEl.innerHTML = titleHtml;
    // длинные заголовки — компактнее, чтобы не обрезались
    var plain = titleEl.textContent || "";
    titleEl.classList.toggle("compact", plain.length > 16);
    subtitleEl.textContent = subtitle || "";
    subtitleEl.style.display = subtitle ? "" : "none";
  }

  // Заголовок дня: часть после тире — лаймовым акцентом
  function dayTitleHtml(name) {
    var idx = name.indexOf("—");
    if (idx === -1) return '<span class="hl">' + esc(name) + '</span>';
    var before = name.slice(0, idx + 1);
    var after = name.slice(idx + 1).trim();
    return esc(before) + ' <span class="hl">' + esc(after) + '</span>';
  }

  // ================= ЭКРАН: КЛИЕНТЫ =================
  function renderClients() {
    setHeader('<span>@ilya.fitpro</span>', 'ТВОИ <span class="hl">КЛИЕНТЫ</span>',
      data.клиенты.length ? (data.клиенты.length + " активных · выбери, чтобы открыть") : "");
    toolbarEl.innerHTML =
      '<button class="btn btn-primary" data-act="add-client">+ Клиент</button>' +
      '<button class="btn btn-ghost" data-act="export">Экспорт</button>' +
      '<button class="btn btn-ghost" data-act="import">Импорт</button>';
    if (!data.клиенты.length) {
      view.innerHTML = '<p class="empty">Пока нет клиентов.<br>Нажми «+ Клиент», чтобы добавить.</p>';
      return;
    }
    view.innerHTML = '<div class="list">' + data.клиенты.map(function (c) {
      var kind = c.люди.length > 1 ? "пара" : "1 человек";
      return '<button class="tile" data-nav="#/client/' + esc(c.id) + '">' +
        '<span><span class="tile-title">' + esc(c.имя) + '</span>' +
        '<span class="tile-sub">' + kind + ' · ' + c.дни.length + ' дн. программы</span></span>' +
        '<span class="tile-chevron">›</span></button>';
    }).join("") + '</div>';
  }

  // ================= ЭКРАН: КЛИЕНТ (дни) =================
  function abonInfo(ab) {
    if (!ab || ab.осталось == null) return { cls: "", text: "не задан" };
    var cls = ab.осталось <= 0 ? "crit" : (ab.осталось <= 2 ? "warn" : "");
    return { cls: cls, text: ab.осталось + " из " + (ab.всего != null ? ab.всего : "?") };
  }
  function renderClient(cid) {
    var client = findClient(cid);
    if (!client) { location.hash = "#/"; return; }
    var titleHl = client.люди.length > 1
      ? esc(client.люди[0]) + ' <span class="hl">и ' + esc(client.люди.slice(1).join(", ")) + '</span>'
      : '<span class="hl">' + esc(client.имя) + '</span>';
    setHeader('<button class="back" data-nav="#/">← клиенты</button>', titleHl,
      (client.люди.length > 1 ? "пара" : "1 человек") + " · " + client.дни.length + " дн. программы");
    toolbarEl.innerHTML =
      '<button class="btn btn-primary" data-act="add-day">+ День</button>' +
      '<button class="btn btn-ghost" data-act="export">Экспорт</button>' +
      '<button class="btn btn-ghost" data-act="del-client">Удалить клиента</button>';

    var ab = client.абонемент, ai = abonInfo(ab);
    var abonHtml =
      '<div class="abon"><div class="abon-row">' +
        '<div><div class="abon-left">Абонемент · осталось тренировок</div>' +
        '<div class="abon-big ' + ai.cls + '">' + ai.text + '</div></div>' +
        '<button class="abon-edit" data-act="edit-abon">изменить</button>' +
      '</div>' +
      (ab && ab.сумма ? '<div class="abon-left" style="margin-top:8px">Оплачено: ' + Number(ab.сумма).toLocaleString("ru-RU") + ' ₽</div>' : '') +
      '</div>';

    var daysHtml = client.дни.length
      ? '<div class="list">' + client.дни.map(function (d) {
          var p = dayProgress(d), pct = p.total ? Math.round(p.done / p.total * 100) : 0;
          return '<button class="tile" data-nav="#/client/' + esc(client.id) + '/day/' + esc(d.id) + '">' +
            '<span><span class="tile-title">' + esc(d.название) + '</span>' +
            '<span class="tile-sub">' + d.упражнения.length + ' упражнений' +
              (d.история && d.история.length ? ' · ' + d.история.length + ' трен. в истории' : '') + '</span></span>' +
            '<span class="tile-prog"><span class="prog-num">' + p.done + '/' + p.total + ' ✓</span>' +
            '<span class="prog-track"><span class="prog-fill" style="width:' + pct + '%"></span></span></span>' +
            '</button>';
        }).join("") + '</div>'
      : '<p class="empty">Дней пока нет. Нажми «+ День».</p>';

    view.innerHTML = abonHtml + daysHtml;
  }

  // ================= ЭКРАН: ДЕНЬ (тренировка) =================
  var currentDay = null;

  function workIndex(sets, si) {
    var n = 0; for (var i = 0; i <= si; i++) if (!sets[i].разминка) n++; return n;
  }
  function tonnage(day, person) {
    var t = 0;
    day.упражнения.forEach(function (e) {
      e.подходы.forEach(function (s) {
        if (!s.отмечен) return;
        var d = s.данные[person];
        if (d && typeof d.вес === "number" && typeof d.повт === "number") t += d.вес * d.повт;
      });
    });
    return t;
  }
  function best1RM(day, person) {
    var best = 0;
    day.упражнения.forEach(function (e) {
      e.подходы.forEach(function (s) {
        var d = s.данные[person];
        if (d && typeof d.вес === "number" && typeof d.повт === "number" && d.повт > 0) {
          var rm = d.вес * (1 + d.повт / 30);
          if (rm > best) best = rm;
        }
      });
    });
    return best;
  }

  function renderDay(cid, did) {
    var client = findClient(cid);
    var day = findDay(client, did);
    if (!day) { location.hash = "#/client/" + cid; return; }
    currentDay = day;
    setHeader('<button class="back" data-nav="#/client/' + esc(cid) + '">← ' + esc(client.имя) + '</button>',
      dayTitleHtml(day.название), "");

    toolbarEl.innerHTML =
      '<button class="btn btn-primary" data-act="finish-day">✓ Завершить тренировку</button>' +
      '<button class="btn btn-ghost" data-nav="#/client/' + esc(cid) + '/history">История' +
        (clientHistoryCount(client) ? ' (' + clientHistoryCount(client) + ')' : '') + '</button>' +
      '<button class="btn btn-ghost" data-act="del-day">Удалить день</button>';

    var people = client.люди;

    // панель тоннажа
    var tonHtml = '<div class="tonnage">' + people.map(function (p) {
      var t = tonnage(day, p), rm = best1RM(day, p);
      return '<div class="ton-tile"><div class="ton-label">' + esc(p) + ' · тоннаж</div>' +
        '<div class="ton-val">' + (t ? t.toLocaleString("ru-RU") : "0") + '<span class="u">кг</span></div>' +
        '<div class="ton-label" style="margin-top:8px">оценка 1ПМ</div>' +
        '<div class="ton-val">' + (rm ? Math.round(rm) : "—") + '<span class="u">кг</span></div></div>';
    }).join("") + '</div>';

    // повтор прошлой + название дня редактируемое
    var repeatBtn = day.история.length
      ? '<div class="addrow"><button class="btn btn-ghost" data-act="repeat-last">↺ Повторить прошлую тренировку</button></div>'
      : '';

    var exHtml = day.упражнения.map(function (e, ei) { return renderExercise(e, ei, people); }).join("");

    var noteHtml =
      '<p class="note-label">Заметка к тренировке</p>' +
      '<textarea class="note-area" data-act="edit-note" placeholder="Например: у Данила болело колено, в след. раз +2.5 кг в жиме…">' + esc(day.заметка) + '</textarea>';

    var restHtml =
      '<div class="rest-bar"><span class="rest-time" id="rest-time">1:30</span>' +
      '<div class="rest-btns">' +
        '<button class="btn btn-primary" data-act="rest-start">Отдых 90 с</button>' +
        '<button class="btn btn-ghost" data-act="rest-60">60</button>' +
        '<button class="btn btn-ghost" data-act="rest-120">120</button>' +
        '<button class="btn btn-ghost" data-act="rest-stop">Стоп</button>' +
      '</div></div>';

    var dayNameHtml =
      '<p class="note-label">Название дня</p>' +
      '<input class="day-name" data-act="rename-day" value="' + esc(day.название) + '" placeholder="Например: День 1 — ноги">';

    view.innerHTML = dayNameHtml + tonHtml + repeatBtn + exHtml +
      '<div class="addrow"><button class="btn btn-primary btn-block" data-act="add-ex">+ Упражнение</button></div>' +
      noteHtml + restHtml +
      '<p class="hint">Всё редактируется: коснись названия дня, упражнения, веса или повторов. «Завершить тренировку» запишет дату и время в историю и спишет занятие с абонемента.</p>';
  }

  function renderExercise(e, ei, people) {
    var headCols = people.map(function (p) { return '<th colspan="2" class="pcol phead">' + esc(p) + '</th>'; }).join("");
    var subCols = people.map(function () { return '<th class="pcol">кг</th><th>раз</th>'; }).join("");
    var rows = e.подходы.map(function (s, si) {
      var label = s.разминка ? '<span class="warm">разм.</span>' : ('раб. ' + workIndex(e.подходы, si));
      var cells = people.map(function (p) {
        var d = s.данные[p] || { вес: null, повт: null };
        return '<td class="pcol"><input class="num" inputmode="decimal" data-act="edit-weight" data-ex="' + ei + '" data-set="' + si + '" data-person="' + esc(p) + '" value="' + (d.вес == null ? "" : d.вес) + '" placeholder="–"></td>' +
          '<td><input class="num" inputmode="numeric" data-act="edit-reps" data-ex="' + ei + '" data-set="' + si + '" data-person="' + esc(p) + '" value="' + (d.повт == null ? "" : d.повт) + '" placeholder="–"></td>';
      }).join("");
      return '<tr><td class="slab">' + label + '</td>' +
        '<td><button class="scheck ' + (s.отмечен ? "on" : "") + '" data-act="toggle-set" data-ex="' + ei + '" data-set="' + si + '">✓</button></td>' +
        cells +
        '<td><button class="ex-btn del" data-act="del-set" data-ex="' + ei + '" data-set="' + si + '">✕</button></td></tr>';
    }).join("");
    return '<div class="exercise ' + (e.сделано ? "done" : "") + '" data-ex="' + ei + '">' +
      '<div class="ex-head">' +
        '<button class="ex-check ' + (e.сделано ? "on" : "") + '" data-act="toggle-ex" data-ex="' + ei + '">✓</button>' +
        '<input class="ex-name" data-act="rename-ex" data-ex="' + ei + '" value="' + esc(e.название) + '">' +
        '<button class="ex-btn chart" data-act="chart-ex" data-ex="' + ei + '" title="Прогресс">📈</button>' +
        '<button class="ex-btn del" data-act="del-ex" data-ex="' + ei + '">✕</button>' +
      '</div>' +
      '<div class="sets-wrap"><table class="sets">' +
        '<thead><tr><th class="lbl"></th><th></th>' + headCols + '</tr>' +
        '<tr><th class="lbl">подход</th><th>✓</th>' + subCols + '</tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div>' +
      '<div class="addrow">' +
        '<button class="btn btn-ghost" data-act="add-set" data-ex="' + ei + '">+ подход</button>' +
        '<button class="btn btn-ghost" data-act="add-warm" data-ex="' + ei + '">+ разминка</button>' +
      '</div></div>';
  }

  // ================= ЭКРАН: ИСТОРИЯ (общая по клиенту) =================
  // filterDid — id дня для фильтра, или "" (все дни).
  function renderHistory(cid, filterDid) {
    var client = findClient(cid);
    if (!client) { location.hash = "#/"; return; }
    setHeader('<button class="back" data-nav="#/client/' + esc(cid) + '">← ' + esc(client.имя) + '</button>',
      'ИСТО<span class="hl">РИЯ</span>', "");

    // собираем ВСЕ записи по всем дням клиента, добавляя название дня к каждой
    var all = [];
    client.дни.forEach(function (d) {
      (d.история || []).forEach(function (h) {
        all.push({ h: h, dayName: d.название, dayId: d.id });
      });
    });
    // сортировка: сначала новые (по дате, потом по времени)
    all.sort(function (a, b) {
      var byDate = (b.h.дата || "").localeCompare(a.h.дата || "");
      if (byDate !== 0) return byDate;
      return (b.h.время || "").localeCompare(a.h.время || "");
    });

    var filtered = filterDid ? all.filter(function (x) { return x.dayId === filterDid; }) : all;

    // фильтр-кнопки: Все + по каждому дню
    var chips = '<button class="chip ' + (!filterDid ? "on" : "") + '" data-nav="#/client/' + esc(cid) + '/history">Все (' + all.length + ')</button>';
    client.дни.forEach(function (d) {
      var cnt = (d.история || []).length;
      chips += '<button class="chip ' + (filterDid === d.id ? "on" : "") + '" data-nav="#/client/' + esc(cid) + '/history/' + esc(d.id) + '">' + esc(d.название) + ' (' + cnt + ')</button>';
    });
    toolbarEl.innerHTML = '';
    var chipsHtml = '<div class="chips">' + chips + '</div>';

    if (!filtered.length) {
      view.innerHTML = chipsHtml + '<p class="empty">Пока нет записанных тренировок.<br>Заверши тренировку на экране дня — она появится здесь с датой и временем.</p>';
      return;
    }
    var itemsHtml = filtered.map(function (x) {
      var h = x.h;
      var dt = new Date(h.дата + "T00:00:00");
      var ds = isNaN(dt) ? h.дата : new Intl.DateTimeFormat("ru-RU", { day: "numeric", month: "long", year: "numeric" }).format(dt);
      var when = ds + (h.время ? ", " + h.время : "");
      var sub = (h.тоннаж ? Object.keys(h.тоннаж).map(function (p) { return p + ": " + h.тоннаж[p] + " кг"; }).join(" · ") : "");
      return '<div class="hist-item">' +
        '<div class="hist-date">' + esc(when) + '</div>' +
        '<div class="hist-sub" style="color:var(--lime)">' + esc(x.dayName) + '</div>' +
        (sub ? '<div class="hist-sub">Тоннаж — ' + esc(sub) + '</div>' : '') +
        (h.заметка ? '<div class="hist-note">' + esc(h.заметка) + '</div>' : '') + '</div>';
    }).join("");
    view.innerHTML = chipsHtml + itemsHtml;
  }

  // ================= ЭКРАН: ПРОГРЕСС УПРАЖНЕНИЯ =================
  function renderChart(cid, did, exId) {
    var client = findClient(cid);
    var day = findDay(client, did);
    if (!day) { location.hash = "#/client/" + cid; return; }
    var exName = decodeURIComponent(exId);
    setHeader('<button class="back" data-nav="#/client/' + esc(cid) + '/day/' + esc(did) + '">← ' + esc(day.название) + '</button>',
      'ПРОГ<span class="hl">РЕСС</span>', esc(exName));
    toolbarEl.innerHTML = "";
    // собираем по истории точки веса (макс рабочий вес на дату), по каждому человеку
    var people = client.люди;
    var html = people.map(function (p) {
      var pts = [];
      day.история.forEach(function (h) {
        if (!h.снимок) return;
        var rec = h.снимок[exName];
        if (rec && rec[p] != null) pts.push({ дата: h.дата, вес: rec[p] });
      });
      pts.sort(function (a, b) { return (a.дата || "").localeCompare(b.дата || ""); });
      return '<div class="chart-wrap"><div class="ton-label">' + esc(p) + '</div>' + sparkline(pts) + '</div>';
    }).join("");
    view.innerHTML = html || '<p class="empty">Нет данных.</p>';
  }
  function sparkline(pts) {
    if (!pts.length) return '<p class="hint" style="margin-top:8px">Нет записанных тренировок с этим упражнением. Заверши хотя бы одну — и здесь появится график роста веса.</p>';
    var W = 300, H = 90, px = 10, py = 14;
    var ws = pts.map(function (p) { return p.вес; });
    var min = Math.min.apply(null, ws), max = Math.max.apply(null, ws);
    if (min === max) { min -= 1; max += 1; }
    var n = pts.length;
    var coords = pts.map(function (p, i) {
      return { x: n === 1 ? W / 2 : px + i * (W - 2 * px) / (n - 1),
               y: py + (1 - (p.вес - min) / (max - min)) * (H - 2 * py) };
    });
    var poly = coords.map(function (c) { return c.x.toFixed(1) + "," + c.y.toFixed(1); }).join(" ");
    var dots = coords.map(function (c) { return '<circle cx="' + c.x.toFixed(1) + '" cy="' + c.y.toFixed(1) + '" r="4" fill="#d4f000"/>'; }).join("");
    var delta = pts[pts.length - 1].вес - pts[0].вес;
    var dLabel = pts.length > 1 ? (delta >= 0 ? "+" : "") + delta.toFixed(1) + " кг" : "";
    return '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" height="90" style="margin-top:8px">' +
      (pts.length > 1 ? '<polyline points="' + poly + '" fill="none" stroke="#d4f000" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' : '') +
      dots + '</svg>' +
      '<div class="chart-meta"><span>' + pts.length + ' точек</span>' +
      (dLabel ? '<span class="chart-delta" style="color:' + (delta >= 0 ? "#3ddc84" : "#ff453a") + '">' + dLabel + '</span>' : '') + '</div>';
  }

  // ================= ДЕЙСТВИЯ =================
  function addClient() {
    var name = prompt("Имя клиента (или первого из пары):");
    if (!name) return;
    name = name.trim(); if (!name) return;
    var pair = confirm("Это пара (двое)? ОК — да, Отмена — один человек.");
    var люди = [name], имя = name;
    if (pair) {
      var second = prompt("Имя второго:");
      if (second && second.trim()) { люди.push(second.trim()); имя = name + " и " + second.trim(); }
    }
    var c = { id: uid(), имя: имя, люди: люди, абонемент: { всего: null, осталось: null, сумма: null }, дни: [] };
    data.клиенты.push(c); save(); location.hash = "#/client/" + c.id;
  }
  function addDay(client) {
    client.дни.push({ id: uid(), название: "Новый день", заметка: "", история: [], упражнения: [] });
    save(); route();
  }
  function editAbon(client) {
    var ab = client.абонемент || (client.абонемент = {});
    var total = prompt("Всего тренировок в абонементе:", ab.всего != null ? ab.всего : "");
    if (total !== null) ab.всего = total.trim() === "" ? null : Number(total);
    var left = prompt("Осталось тренировок:", ab.осталось != null ? ab.осталось : (ab.всего != null ? ab.всего : ""));
    if (left !== null) ab.осталось = left.trim() === "" ? null : Number(left);
    var sum = prompt("Сумма оплаты, ₽:", ab.сумма != null ? ab.сумма : "");
    if (sum !== null) ab.сумма = sum.trim() === "" ? null : Number(sum);
    save(); route();
  }
  function finishDay(client, day) {
    // снимок весов по упражнениям (макс рабочий вес на человека) для графиков прогресса
    var снимок = {};
    day.упражнения.forEach(function (e) {
      var perPerson = {};
      e.подходы.forEach(function (s) {
        if (s.разминка) return;
        for (var p in s.данные) {
          var w = s.данные[p].вес;
          if (typeof w === "number" && (perPerson[p] == null || w > perPerson[p])) perPerson[p] = w;
        }
      });
      if (Object.keys(perPerson).length) снимок[e.название] = perPerson;
    });
    var ton = {};
    client.люди.forEach(function (p) { ton[p] = tonnage(day, p); });
    day.история.push({ дата: todayISO(), время: nowTime(), заметка: day.заметка || "", снимок: снимок, тоннаж: ton });
    // списываем занятие
    var ab = client.абонемент;
    if (ab && typeof ab.осталось === "number") ab.осталось = Math.max(0, ab.осталось - 1);
    // сбрасываем галочки для следующего раза (веса оставляем)
    day.упражнения.forEach(function (e) { e.сделано = false; e.подходы.forEach(function (s) { s.отмечен = false; }); });
    save();
    alert("Тренировка записана в историю (" + todayISO() + ").");
    route();
  }
  function repeatLast(day) {
    if (!day.история.length) return;
    var last = day.история[day.история.length - 1];
    if (!last.снимок) { alert("В прошлой записи нет данных о весах."); return; }
    day.упражнения.forEach(function (e) {
      var rec = last.снимок[e.название];
      if (!rec) return;
      e.подходы.forEach(function (s) {
        if (s.разминка) return;
        for (var p in rec) { if (s.данные[p]) s.данные[p].вес = rec[p]; }
      });
    });
    save(); route();
    alert("Веса подставлены из прошлой тренировки.");
  }

  // ---- Таймер отдыха ----
  var restTimer = null, restLeft = 0;
  function fmt(sec) { var m = Math.floor(sec / 60), s = sec % 60; return m + ":" + (s < 10 ? "0" : "") + s; }
  function restStart(sec) {
    restStop();
    restLeft = sec;
    var el = document.getElementById("rest-time");
    if (el) { el.textContent = fmt(restLeft); el.classList.remove("zero"); }
    restTimer = setInterval(function () {
      restLeft--;
      var e = document.getElementById("rest-time");
      if (restLeft <= 0) {
        restStop();
        if (e) { e.textContent = "0:00"; e.classList.add("zero"); }
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        return;
      }
      if (e) e.textContent = fmt(restLeft);
    }, 1000);
  }
  function restStop() { if (restTimer) { clearInterval(restTimer); restTimer = null; } }

  // ---- Клики ---- (на body, чтобы ловить и кнопки тулбара, и view)
  document.body.addEventListener("click", function (evt) {
    var btn = evt.target.closest("[data-act]");
    if (!btn) return;
    var act = btn.dataset.act;

    // действия таймера — не требуют дня в модели
    if (act === "rest-start") { restStart(90); return; }
    if (act === "rest-60") { restStart(60); return; }
    if (act === "rest-120") { restStart(120); return; }
    if (act === "rest-stop") { restStop(); var e = document.getElementById("rest-time"); if (e) { e.textContent = "1:30"; e.classList.remove("zero"); } return; }

    var m = location.hash.match(/^#\/client\/([^/]+)(?:\/day\/([^/]+))?/);
    var client = m ? findClient(decodeURIComponent(m[1])) : null;
    var day = (m && m[2] && client) ? findDay(client, decodeURIComponent(m[2])) : null;

    if (act === "export") { doExport(); return; }
    if (act === "import") { doImport(); return; }
    if (act === "add-client") { addClient(); return; }
    if (act === "del-client") {
      if (client && confirm("Удалить клиента «" + client.имя + "» со всеми данными?")) {
        data.клиенты = data.клиенты.filter(function (c) { return c.id !== client.id; });
        save(); location.hash = "#/";
      }
      return;
    }
    if (act === "add-day") { if (client) addDay(client); return; }
    if (act === "edit-abon") { if (client) editAbon(client); return; }

    if (!day) return;
    var ei = btn.dataset.ex != null ? +btn.dataset.ex : null;
    var si = btn.dataset.set != null ? +btn.dataset.set : null;

    if (act === "finish-day") { finishDay(client, day); return; }
    if (act === "repeat-last") { repeatLast(day); return; }
    if (act === "toggle-ex") { day.упражнения[ei].сделано = !day.упражнения[ei].сделано; save(); route(); return; }
    if (act === "del-ex") { if (confirm("Удалить упражнение?")) { day.упражнения.splice(ei, 1); save(); route(); } return; }
    if (act === "chart-ex") { location.hash = "#/client/" + client.id + "/day/" + day.id + "/chart/" + encodeURIComponent(day.упражнения[ei].название); return; }
    if (act === "add-ex") {
      day.упражнения.push(ex("Новое упражнение", defSets(client.люди))); save(); route(); return;
    }
    if (act === "toggle-set") { day.упражнения[ei].подходы[si].отмечен = !day.упражнения[ei].подходы[si].отмечен; save(); route(); return; }
    if (act === "add-set" || act === "add-warm") {
      var b = {}; client.люди.forEach(function (p) { b[p] = [null, null]; });
      day.упражнения[ei].подходы.push(set(act === "add-warm", b)); save(); route(); return;
    }
    if (act === "del-set") { day.упражнения[ei].подходы.splice(si, 1); save(); route(); return; }
    if (act === "del-day") {
      if (confirm("Удалить день «" + day.название + "» со всеми упражнениями и историей этого дня?")) {
        client.дни = client.дни.filter(function (d) { return d.id !== day.id; });
        save(); location.hash = "#/client/" + client.id;
      }
      return;
    }
  });

  // ---- Ввод (названия / веса / заметка) ----
  view.addEventListener("input", function (evt) {
    var el = evt.target.closest("[data-act]");
    if (!el) return;
    var act = el.dataset.act;
    var m = location.hash.match(/^#\/client\/([^/]+)\/day\/([^/]+)/);
    if (!m) return;
    var client = findClient(decodeURIComponent(m[1]));
    var day = findDay(client, decodeURIComponent(m[2]));
    if (!day) return;

    if (act === "edit-note") { day.заметка = el.value; save(); return; }
    if (act === "rename-day") { day.название = el.value; save(); return; }
    var ei = +el.dataset.ex;
    if (act === "rename-ex") { day.упражнения[ei].название = el.value; save(); return; }
    var si = +el.dataset.set, person = el.dataset.person;
    var s = day.упражнения[ei].подходы[si];
    if (!s.данные[person]) s.данные[person] = { вес: null, повт: null };
    var val = el.value.trim();
    var num = val === "" ? null : Number(val.replace(",", "."));
    if (act === "edit-weight") s.данные[person].вес = (val === "" || isNaN(num)) ? null : num;
    if (act === "edit-reps") s.данные[person].повт = (val === "" || isNaN(num)) ? null : num;
    save();
  });

  // ---- Навигация ----
  document.body.addEventListener("click", function (e) {
    var nav = e.target.closest("[data-nav]");
    if (nav) { location.hash = nav.dataset.nav; }
  });

  // ---- Экспорт/импорт ----
  function doExport() {
    try {
      var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "тренировки_" + todayISO() + ".json";
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    } catch (e) { prompt("Скопируй данные:", JSON.stringify(data)); }
  }
  function doImport() {
    var inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = function () {
      var f = inp.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function () {
        try {
          var parsed = JSON.parse(r.result);
          if (!parsed || !Array.isArray(parsed.клиенты)) throw new Error("нет поля клиенты");
          data = migrate(parsed); save(); route(); alert("Данные загружены.");
        } catch (e) { alert("Не удалось прочитать файл: " + e.message); }
      };
      r.readAsText(f);
    };
    inp.click();
  }

  // ---- Роутер ----
  function route() {
    restStop();
    var h = location.hash || "#/";
    var chartM = h.match(/^#\/client\/([^/]+)\/day\/([^/]+)\/chart\/(.+)$/);
    var histDayM = h.match(/^#\/client\/([^/]+)\/history\/([^/]+)$/);
    var histM = h.match(/^#\/client\/([^/]+)\/history$/);
    var dayM = h.match(/^#\/client\/([^/]+)\/day\/([^/]+)$/);
    var cliM = h.match(/^#\/client\/([^/]+)$/);
    if (chartM) renderChart(decodeURIComponent(chartM[1]), decodeURIComponent(chartM[2]), chartM[3]);
    else if (histDayM) renderHistory(decodeURIComponent(histDayM[1]), decodeURIComponent(histDayM[2]));
    else if (histM) renderHistory(decodeURIComponent(histM[1]), "");
    else if (dayM) renderDay(decodeURIComponent(dayM[1]), decodeURIComponent(dayM[2]));
    else if (cliM) renderClient(decodeURIComponent(cliM[1]));
    else renderClients();
  }
  window.addEventListener("hashchange", route);

  function boot() {
    try {
      // Закрепляем нормализованную (мигрированную) структуру в хранилище,
      // чтобы новые поля появились сразу, а не только после первого действия.
      try { rawSet(KEY, JSON.stringify(data)); rawSet(BACKUP, JSON.stringify(data)); } catch (e) {}
      route();
    } catch (e) {
      if (view) view.innerHTML = '<p class="hint" style="color:#ff453a">Ошибка запуска: ' + String(e && e.message || e) + '</p>';
    }
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();
</script>
</body>
</html>
